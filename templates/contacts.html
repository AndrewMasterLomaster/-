{% extends 'base.html' %}

{% block content %}
<div class="container text-center text-white p-5" style="background-color: #007bff; min-height: 100vh; border-radius: 30px;">
    <h1>Связь с Мастером</h1>
    
    {% if status %}
        <div class="alert alert-warning">{{ status }}</div>
    {% endif %}

    <form method="POST" class="mt-4 mx-auto" style="max-width: 500px;">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="user_name" class="form-control form-control-lg" placeholder="Твое имя" required>
        </div>
        <div class="mb-3">
            <textarea name="user_message" class="form-control" rows="4" placeholder="Твое сообщение" required></textarea>
        </div>
        <button type="submit" class="btn btn-success btn-lg w-100 shadow">ОТПРАВИТЬ</button>
    </form>

    <hr class="my-5">

    <h2 class="mb-4">История сообщений</h2>
    <div class="row justify-content-center">
        {% for m in all_msgs %}
            <div class="col-md-8">
                <div class="card bg-light text-dark mb-3 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ m.name }}</h5>
                        <p class="card-text">{{ m.message }}</p>
                        <p class="card-text">
                            <small class="text-muted">{{ m.created_at|date:"d.m.Y H:i" }}</small>
                        </p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
